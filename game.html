<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verda – اجمع الأوراق</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a2e1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Georgia', serif;
    }
    #vg {
      width: 480px;
      height: 620px;
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      user-select: none;
      cursor: default;
    }
    @media (max-width: 500px) {
      #vg { width: 100vw; height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>

<div id="vg">

  <!-- Background SVG -->
  <svg style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 480 620" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#B5D8F7"/>
        <stop offset="55%" stop-color="#D8F3DC"/>
        <stop offset="100%" stop-color="#52B788"/>
      </linearGradient>
      <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2D6A4F"/>
        <stop offset="100%" stop-color="#1B4332"/>
      </linearGradient>
    </defs>
    <rect width="480" height="620" fill="url(#sky)"/>
    <rect y="540" width="480" height="80" fill="url(#ground)"/>
    <!-- Clouds -->
    <ellipse cx="80"  cy="35" rx="50" ry="20" fill="white" opacity="0.7"/>
    <ellipse cx="115" cy="28" rx="38" ry="16" fill="white" opacity="0.7"/>
    <ellipse cx="55"  cy="38" rx="32" ry="14" fill="white" opacity="0.7"/>
    <ellipse cx="370" cy="50" rx="55" ry="22" fill="white" opacity="0.6"/>
    <ellipse cx="410" cy="42" rx="42" ry="18" fill="white" opacity="0.6"/>
    <ellipse cx="345" cy="55" rx="34" ry="15" fill="white" opacity="0.6"/>
    <!-- Trees -->
    <polygon points="20,540 55,455 90,540"  fill="#1B4332"/>
    <polygon points="42,540 68,475 95,540"  fill="#2D6A4F"/>
    <polygon points="200,540 235,450 270,540" fill="#1B4332"/>
    <polygon points="218,540 245,468 272,540" fill="#2D6A4F"/>
    <polygon points="395,540 430,445 465,540" fill="#1B4332"/>
    <polygon points="415,540 440,465 465,540" fill="#2D6A4F"/>
    <!-- Trunks -->
    <rect x="48"  y="520" width="10" height="22" fill="#6B4226"/>
    <rect x="228" y="520" width="10" height="22" fill="#6B4226"/>
    <rect x="423" y="520" width="10" height="22" fill="#6B4226"/>
    <!-- Ground bumps -->
    <ellipse cx="120" cy="540" rx="45" ry="12" fill="#2D6A4F" opacity="0.5"/>
    <ellipse cx="320" cy="540" rx="50" ry="12" fill="#2D6A4F" opacity="0.5"/>
  </svg>

  <!-- UI Bar -->
  <div id="ui-bar" style="position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:center;z-index:10;">
    <div style="background:rgba(27,67,50,0.88);color:#D8F3DC;padding:7px 16px;border-radius:20px;font-size:18px;letter-spacing:3px;font-weight:bold;">VERDA</div>
    <div style="background:rgba(255,255,255,0.88);padding:6px 16px;border-radius:20px;color:#1B4332;font-size:16px;font-weight:bold;">🍃 <span id="score-val">0</span></div>
    <div id="timer-box" style="background:rgba(255,255,255,0.88);padding:6px 16px;border-radius:20px;color:#1B4332;font-size:16px;font-weight:bold;">⏱ <span id="timer-val">30</span>ث</div>
  </div>

  <!-- Game Area -->
  <div id="game-area" style="position:absolute;inset:0;z-index:5;"></div>

  <!-- Start Screen -->
  <div id="start-screen" style="position:absolute;inset:0;background:rgba(27,67,50,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;color:white;">
    <div style="font-size:60px;margin-bottom:8px;">🌿</div>
    <div style="font-size:28px;letter-spacing:5px;font-weight:bold;color:#74C69D;margin-bottom:6px;">VERDA</div>
    <div style="font-size:13px;opacity:0.75;margin-bottom:14px;">من طبيعة الأرض لقدمك</div>
    <div style="background:rgba(82,183,136,0.2);border:1px solid rgba(82,183,136,0.5);border-radius:12px;padding:14px 24px;margin-bottom:18px;text-align:center;">
      <div style="font-size:14px;line-height:2.2;color:#D8F3DC;">
        🍃 ورق أخضر = <b>+1 نقطة</b><br>
        🍁 ورق أحمر = <b>+1 نقطة</b><br>
        🌸 زهور = <b>+3 نقاط</b><br>
        🌰 جوزة = <b>+2 نقطة</b><br>
        💧 مطر = <b style="color:#ff9090;">-1 نقطة ⚠️</b>
      </div>
    </div>
    <div style="font-size:12px;opacity:0.6;margin-bottom:22px;">عندك 30 ثانية، اجمع أكبر عدد!</div>
    <button id="start-btn" style="background:#52B788;color:white;border:none;padding:13px 40px;border-radius:30px;font-size:16px;cursor:pointer;font-family:inherit;">ابدأ اللعبة 🌿</button>
  </div>

  <!-- End Screen -->
  <div id="end-screen" style="position:absolute;inset:0;background:rgba(27,67,50,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;color:white;">
    <div id="end-emoji" style="font-size:64px;margin-bottom:10px;">🏆</div>
    <div style="font-size:20px;opacity:0.8;margin-bottom:6px;">اللعبة انتهت!</div>
    <div style="font-size:15px;opacity:0.65;">جمعت</div>
    <div id="final-score" style="font-size:72px;font-weight:bold;color:#74C69D;line-height:1.1;">0</div>
    <div style="font-size:15px;opacity:0.65;margin-bottom:10px;">نقطة 🍃</div>
    <div id="rating-text" style="font-size:17px;color:#D8F3DC;margin-bottom:28px;text-align:center;padding:0 20px;"></div>
    <button id="replay-btn" style="background:#52B788;color:white;border:none;padding:13px 40px;border-radius:30px;font-size:16px;cursor:pointer;font-family:inherit;">العب تاني 🌿</button>
  </div>

</div>

<script>
(function () {
  let score = 0, timeLeft = 30, running = false, gTimer = null, sTimer = null;

  const ITEMS = [
    { char: '🍃', pts:  1, sz: 38, spd: [2.5, 4.5], prob: 0.18 },
    { char: '🍁', pts:  1, sz: 38, spd: [2.5, 4.5], prob: 0.12 },
    { char: '🍂', pts:  1, sz: 36, spd: [2.0, 4.0], prob: 0.10 },
    { char: '🌸', pts:  3, sz: 34, spd: [1.5, 3.0], prob: 0.06 },
    { char: '🌰', pts:  2, sz: 32, spd: [3.5, 6.0], prob: 0.09 },
    { char: '💧', pts: -1, sz: 28, spd: [5.0, 9.0], prob: 0.45 },
  ];

  function pick() {
    let r = Math.random(), c = 0;
    for (let it of ITEMS) { c += it.prob; if (r < c) return it; }
    return ITEMS[0];
  }

  function spawn() {
    if (!running) return;
    const ga = document.getElementById('game-area');
    const it = pick();
    const el = document.createElement('div');
    const x = 20 + Math.random() * (ga.offsetWidth - 60);
    const spd = it.spd[0] + Math.random() * (it.spd[1] - it.spd[0]);
    let rot = Math.random() * 360, rs = (Math.random() - 0.5) * 4, posY = -60, t = 0;

    el.style.cssText = `position:absolute;left:${x}px;top:-60px;font-size:${it.sz}px;cursor:pointer;transform:rotate(${rot}deg);filter:drop-shadow(1px 2px 3px rgba(0,0,0,.25));transition:opacity .15s,transform .15s;`;
    el.textContent = it.char;

    el.addEventListener('click', function (e) {
      if (!running) return;
      e.stopPropagation();
      score += it.pts;
      if (score < 0) score = 0;
      document.getElementById('score-val').textContent = score;
      const color = it.pts < 0 ? '#ff6b6b' : '#52B788';
      const label = it.pts < 0 ? '-1 💧' : '+' + it.pts;
      showPop(label, el.offsetLeft + el.offsetWidth / 2, posY, color);
      if (it.pts < 0) shakeUI();
      el.style.transform = 'scale(1.8) rotate(' + (rot + 30) + 'deg)';
      el.style.opacity = '0';
      clearInterval(fallInt);
      setTimeout(() => el.remove(), 200);
    });

    ga.appendChild(el);

    const fallInt = setInterval(() => {
      if (!running) { clearInterval(fallInt); el.remove(); return; }
      posY += spd;
      t += 0.04;
      const swayX = x + (it.pts < 0 ? 0 : Math.sin(t) * 18);
      el.style.left = swayX + 'px';
      el.style.top = posY + 'px';
      if (it.pts >= 0) { rot += rs; el.style.transform = 'rotate(' + rot + 'deg)'; }
      if (posY > ga.offsetHeight + 80) { clearInterval(fallInt); el.remove(); }
    }, 20);
  }

  function showPop(txt, x, y, color) {
    const ga = document.getElementById('game-area');
    const el = document.createElement('div');
    el.textContent = txt;
    el.style.cssText = `position:absolute;left:${x - 20}px;top:${y}px;color:${color};font-size:20px;font-weight:bold;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.5);z-index:50;transition:top .7s ease,opacity .7s ease;`;
    ga.appendChild(el);
    setTimeout(() => { el.style.top = (y - 55) + 'px'; el.style.opacity = '0'; }, 30);
    setTimeout(() => el.remove(), 800);
  }

  function shakeUI() {
    const bar = document.getElementById('ui-bar');
    bar.style.transition = 'transform .08s';
    bar.style.transform = 'translateX(-6px)';
    setTimeout(() => { bar.style.transform = 'translateX(6px)'; }, 80);
    setTimeout(() => { bar.style.transform = 'translateX(-4px)'; }, 160);
    setTimeout(() => { bar.style.transform = 'translateX(0)'; }, 240);
  }

  function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    score = 0; timeLeft = 30; running = true;
    document.getElementById('score-val').textContent = '0';
    document.getElementById('timer-val').textContent = '30';
    document.getElementById('timer-box').style.background = 'rgba(255,255,255,0.88)';
    document.getElementById('game-area').innerHTML = '';

    spawn();
    sTimer = setInterval(() => {
      spawn();
      if (Math.random() < 0.4) spawn();
    }, 700);

    gTimer = setInterval(() => {
      timeLeft--;
      document.getElementById('timer-val').textContent = timeLeft;
      if (timeLeft <= 10) document.getElementById('timer-box').style.background = 'rgba(255,180,180,0.9)';
      if (timeLeft === 8) {
        clearInterval(sTimer);
        sTimer = setInterval(() => { spawn(); if (Math.random() < 0.55) spawn(); }, 400);
      }
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  function endGame() {
    running = false;
    clearInterval(gTimer); clearInterval(sTimer);
    setTimeout(() => { document.getElementById('game-area').innerHTML = ''; }, 300);
    document.getElementById('final-score').textContent = score;
    let em, rt;
    if (score >= 30)     { em = '🏆'; rt = 'محترف! أنت ملك الغابة! 👑'; }
    else if (score >= 20) { em = '🌟'; rt = 'ممتاز! طبيعي جداً! 🌿'; }
    else if (score >= 10) { em = '🍀'; rt = 'كويس! بس قادر تعمل أحسن!'; }
    else if (score > 0)   { em = '🌱'; rt = 'بداية كويسة، جرب تاني! 💪'; }
    else                  { em = '🌧️'; rt = 'اتبللت! ابعد عن المطر! 😅'; }
    document.getElementById('end-emoji').textContent = em;
    document.getElementById('rating-text').textContent = rt;
    document.getElementById('end-screen').style.display = 'flex';
  }

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('replay-btn').addEventListener('click', () => {
    document.getElementById('end-screen').style.display = 'none';
    startGame();
  });
})();
</script>

</body>
</html>
